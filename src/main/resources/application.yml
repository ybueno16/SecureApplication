spring:
  application:
    name: password-vault
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vault}
    username: ${SPRING_DATASOURCE_USERNAME:vault}
    password: ${SPRING_DATASOURCE_PASSWORD:vault}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  security:
    jwt:
      issuer: ${APP_SECURITY_JWT_ISSUER:password-vault}
      access-token-expiration-minutes: 15
      refresh-token-expiration-days: 7
    allowed-origins: ${APP_SECURITY_ALLOWED_ORIGINS:http://localhost:3000}
    rate-limit:
      login-attempts-per-minute: 5
      login-attempts-per-hour: 10
    account-lock:
      max-failed-attempts: 10
      lock-duration-minutes: 15
  crypto:
    pbkdf2-iterations: 600000

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
