version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vault}
      POSTGRES_USER: ${POSTGRES_USER:-vault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vault}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-vault}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-vault}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-vault}
      APP_SECURITY_JWT_ISSUER: password-vault
      APP_SECURITY_ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
