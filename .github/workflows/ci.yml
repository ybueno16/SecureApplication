name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests with coverage
        run: ./gradlew test jacocoTestReport

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/test/html/
          retention-days: 7

      - name: Generate and commit coverage badge
        if: github.event_name == 'push'
        run: |
          CSV=build/reports/jacoco/test/jacocoTestReport.csv
          PCT=$(tail -n +2 "$CSV" | awk -F',' '{m+=$4; c+=$5} END{printf "%d", c*100/(c+m)}')

          if   [ "$PCT" -ge 90 ]; then COLOR="brightgreen"
          elif [ "$PCT" -ge 75 ]; then COLOR="green"
          elif [ "$PCT" -ge 60 ]; then COLOR="yellow"
          else COLOR="red"
          fi

          echo "Coverage: ${PCT}% (${COLOR})"
          curl -sf "https://img.shields.io/badge/coverage-${PCT}%25-${COLOR}.svg?style=flat" \
            -o .github/badges/jacoco.svg

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/jacoco.svg
          git diff --staged --quiet || git commit -m "chore: update coverage badge [skip ci]"
          git push
